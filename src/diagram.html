<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Excalidraw Editor</title>
	<link rel="stylesheet" href="excalidraw.css">
	<style>
		body, html { margin: 0; padding: 0; height: 100%; width: 100%; overflow: hidden; font-family: sans-serif; }
		#app { height: 100vh; width: 100vw; }
		.top-bar {
			position: absolute;
			top: 10px;
			right: 10px;
			z-index: 1000;
			display: flex;
			gap: 10px;
		}
		button {
			padding: 8px 16px;
			background: #3B82F6;
			color: white;
			border: none;
			border-radius: 4px;
			cursor: pointer;
			font-weight: bold;
		}
		button:hover { background: #2563EB; }
	</style>
</head>
<body>
	<div id="app"></div>
	<script src="browser-polyfill.min.js"></script>
	<script src="diagram.js"></script>
</body>
</html>
