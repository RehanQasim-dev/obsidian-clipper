<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Video Annotator</title>
	<link rel="stylesheet" href="excalidraw.css">
	<style>
		body, html {
			margin: 0; padding: 0; width: 100%; height: 100%;
			overflow: hidden; background: transparent;
		}
		#app { width: 100%; height: 100%; }
		
		/* Custom minimal UI overlay wrapper */
		.custom-ui {
			position: absolute;
			top: 0; left: 0; right: 0; bottom: 0;
			pointer-events: none;
			display: flex;
			flex-direction: column;
			z-index: 20;
		}
		
		/* Action buttons at top right */
		.top-right-bar {
			position: absolute;
			top: 8px; right: 8px;
			display: flex;
			gap: 8px;
			pointer-events: auto;
		}
		
		.action-btn {
			background: #e62117;
			color: white;
			border: none;
			padding: 6px 12px;
			border-radius: 4px;
			font-weight: bold;
			cursor: pointer;
			font-family: sans-serif;
			font-size: 12px;
		}
		.action-btn.secondary { background: #333; }
		.action-btn:hover { opacity: 0.9; }

		/* Bottom options bar */
		.bottom-options-bar {
			position: absolute;
			bottom: 16px;
			left: 50%;
			transform: translateX(-50%);
			display: flex;
			gap: 16px;
			background: rgba(40, 40, 40, 0.9);
			backdrop-filter: blur(8px);
			border-radius: 24px;
			padding: 6px 16px;
			border: 1px solid rgba(255, 255, 255, 0.1);
			pointer-events: auto;
			align-items: center;
		}

		.option-group {
			position: relative;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		/* Vertical strip shown on hover */
		.option-popup {
			position: absolute;
			bottom: 100%;
			left: 50%;
			transform: translateX(-50%);
			background: transparent;
			padding-bottom: 8px; /* Transparent padding bridges the gap */
			display: none;
			flex-direction: column;
		}

		.option-popup-inner {
			background: rgba(40, 40, 40, 0.95);
			backdrop-filter: blur(8px);
			border-radius: 12px;
			padding: 8px;
			display: flex;
			flex-direction: column;
			gap: 8px;
			border: 1px solid rgba(255, 255, 255, 0.1);
		}

		.option-group:hover .option-popup { display: flex; }

		.option-btn {
			width: 28px; height: 28px;
			border-radius: 6px;
			background: transparent;
			border: 1px solid transparent;
			color: white;
			display: flex;
			align-items: center;
			justify-content: center;
			cursor: pointer;
			font-size: 10px;
		}
		.option-btn:hover { background: rgba(255, 255, 255, 0.1); }
		.option-btn.active { border-color: rgba(255, 255, 255, 0.4); background: rgba(255, 255, 255, 0.2); }
		
		/* SVGs inside option-btn */
		.option-btn svg {
			width: 18px; height: 18px;
			display: block;
		}
		
		/* Color swatch specific */
		.color-swatch { width: 18px; height: 18px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; }
		.color-swatch.active { border-color: white; box-shadow: 0 0 0 1px #000; }

		/* Hide native left properties panel and help button */
		.layer-ui__wrapper .properties-content, 
		.layer-ui__wrapper .FixedSideContainer_side_left,
		.layer-ui__wrapper .help-icon,
		.App-menu_left,
		.App-menu__left {
			display: none !important;
		}

		/* Scale down and adjust the native top toolbar */
		.layer-ui__wrapper .App-toolbar {
			transform: scale(0.8);
			transform-origin: top center;
			margin-top: 4px;
		}
	</style>
</head>
<body>
	<div id="app"></div>
	<script src="video-excalidraw.js"></script>
</body>
</html>
